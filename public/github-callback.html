<html><body><script>const code = new URLSearchParams(window.location.search).get("code");if(code){fetch("https://api-to-sdk-production.up.railway.app/github-token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code})}).then(r=>r.json()).then(d=>{if(d.token){window.opener.postMessage({type:"github-token",token:d.token},"*");window.close();}else{document.body.innerText="Error: "+JSON.stringify(d);}}).catch(e=>{document.body.innerText="Error: "+e.message;});}else{document.body.innerText="No code found";}</script><p>Connecting to GitHub...</p></body></html>
